[package]
description = "Diegetic UI layout engine for Bevy — in-world panels driven by a Clay-inspired layout algorithm"
edition     = "2024"
license     = "MIT OR Apache-2.0"
name        = "bevy_diegetic"
version     = "0.1.0"

[lints.clippy]
# Our strict lints
expect_used = "deny"
panic       = "deny"
unwrap_used = "deny"

# Enable lint groups as errors (with lower priority so allows can override)
all      = { level = "deny", priority = -1 }
cargo    = { level = "deny", priority = -1 }
nursery  = { level = "deny", priority = -1 }
pedantic = { level = "deny", priority = -1 }

# Allow specific lints that conflict with Bevy patterns
cargo_common_metadata   = "allow"
multiple_crate_versions = "allow"
needless_pass_by_value  = "allow"
option_if_let_else      = "allow"
wildcard_imports        = "allow"

[lints.rust]
missing_docs = "deny"

[dependencies]
bevy = { version = "0.18.1", default-features = false, features = [
  "bevy_gizmos",
] }

[dev-dependencies]
clay-layout = { path = "../hana/crates/clay-layout" }
criterion   = { version = "0.8.2", features = ["html_reports"] }

[[bench]]
harness = false
name    = "layout_perf"
