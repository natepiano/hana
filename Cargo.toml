[package]
name = "bevy_panorbit_camera"
version = "0.34.0"
authors = ["Plonq"]
edition = "2021"
description = "A basic pan and orbit camera in Bevy"
keywords = ["gamedev", "bevy", "orbit", "camera"]
categories = ["game-development"]
license = "MIT OR Apache-2.0"
repository = "https://github.com/Plonq/bevy_panorbit_camera"
homepage = "https://github.com/Plonq/bevy_panorbit_camera"
readme = "README.md"

[features]
bevy_egui = ["dep:bevy_egui"]
extras = ["bevy/bevy_asset", "bevy/bevy_log", "bevy/bevy_mesh"]
extras_debug = [
    "extras",
    "bevy/bevy_gizmos",
    "bevy/bevy_pbr",
    "bevy/bevy_picking",
    "bevy/bevy_state",
    "bevy/bevy_text",
    "bevy/bevy_ui",
]

[dependencies]
bevy = { version = "0.18", default-features = false, features = [
    "bevy_core_pipeline",
    "bevy_camera",
    "bevy_window",
] }
bevy_egui = { version = "0.39", optional = true, default-features = false }

[dev-dependencies]
bevy = { version = "0.18", default-features = false, features = ["3d"] }
float-cmp = "0.10.0"
bevy_egui = { version = "0.39", default-features = false, features = [
    "render",
    "default_fonts",
] }
bevy_brp_extras = "0.19.0"
bevy_window_manager = "0.19.0"
bevy_panorbit_camera = { path = ".", features = ["extras_debug"] }

[[example]]
name = "egui"
required-features = ["bevy_egui"]

[[example]]
name = "egui_multiple_windows"
required-features = ["bevy_egui"]

[[example]]
name = "extras"
required-features = ["extras_debug"]

[[example]]
name = "extras_zoom_to_fit"
required-features = ["extras_debug"]

[[example]]
name = "extras_animate_to_fit"
required-features = ["extras"]

[[example]]
name = "extras_play_animation"
required-features = ["extras"]

[[example]]
name = "extras_look_at"
required-features = ["extras"]
