[package]
categories  = ["game-development", "gui"]
description = "Diegetic UI layout engine for Bevy — in-world panels driven by a Clay-inspired layout algorithm"
edition     = "2024"
keywords    = ["bevy", "diegetic", "layout", "ui"]
license     = "MIT OR Apache-2.0"
name        = "bevy_diegetic"
repository  = "https://github.com/natepiano/bevy_diegetic"
version     = "0.0.1"

[lints.clippy]
# Our strict lints
expect_used = "deny"
panic       = "deny"
unwrap_used = "deny"

# Enable lint groups as errors (with lower priority so allows can override)
all      = { level = "deny", priority = -1 }
cargo    = { level = "deny", priority = -1 }
nursery  = { level = "deny", priority = -1 }
pedantic = { level = "deny", priority = -1 }

# Allow specific lints that conflict with Bevy patterns
multiple_crate_versions = "allow"
needless_pass_by_value  = "allow"
option_if_let_else      = "allow"
too_many_arguments      = "allow"
type_complexity         = "allow"
wildcard_imports        = "allow"

[lints.rust]
missing_docs = "deny"

[features]
default            = ["typography_overlay"]
typography_overlay = []

[dependencies]
bevy = { version = "0.18.1", default-features = false, features = [
  "bevy_asset",
  "bevy_core_pipeline",
  "bevy_gizmos",
  "bevy_image",
  "bevy_log",
  "bevy_pbr",
  "bevy_picking",
  "bevy_render",
  "mesh_picking",
] }
bevy_kana = "0.0.3"
bitflags = "2"
etagere = "0.3.0"
fdsm = "0.8"
fdsm-ttf-parser = "0.2"
image = { version = "0.25", default-features = false }
nalgebra = "0.34"
parley = { version = "0.7.0", default-features = false, features = ["std"] }
smallvec = "1"
ttf-parser = "0.25"

[dev-dependencies]
bevy                = { version = "0.18.1", features = ["default_font"] }
bevy-inspector-egui = "0.36.0"
bevy_brp_extras     = "0.19.0"
bevy_lagrange       = { version = "0.0.1", features = ["fit_overlay"] }
bevy_window_manager = "0.19.0"
clay-layout         = { path = "./clay-layout" }
criterion           = { version = "0.8.2", features = ["html_reports"] }
image               = { version = "0.25", features = ["png"] }
msdfgen             = "0.2"
# msdfgen 0.2 implements FontExt on ttf-parser 0.18's Face, not 0.25.
# Renamed import so parity tests can use both versions side by side.
ttf-parser_018 = { package = "ttf-parser", version = "0.18" }

[[example]]
name = "hue_offset"

[[example]]
name = "side_by_side"

[[bench]]
harness = false
name    = "layout_comparison"

[[bench]]
harness = false
name    = "panel_perf"

[[example]]
name              = "typography"
required-features = ["typography_overlay"]

[[example]]
name = "shadows"

[[example]]
name = "atlas_pages"

[[example]]
name = "font_loading"

[[example]]
name = "preload_text"

[[example]]
name = "font_features"

[[example]]
name = "units"

[[example]]
name = "sizes"

[[example]]
name = "dimensions"

[[example]]
name = "panel_rendering"

[[example]]
name = "paper_sizes"

[[example]]
name = "screen_space"
