[workspace]
exclude  = ["vendor/clay-layout"]
members  = ["crates/*"]
resolver = "3"

[workspace.package]
edition    = "2024"
license    = "MIT OR Apache-2.0"
readme     = "README.md"
repository = "https://github.com/natepiano/hana"
version    = "0.0.1"

[workspace.dependencies]
bevy            = { version = "0.18.1", default-features = false }
bevy_kana       = "0.0.5"
bitflags        = "2"
etagere         = "0.3.0"
fdsm            = "0.8"
fdsm-ttf-parser = "0.2"
image           = { version = "0.25", default-features = false }
nalgebra        = "0.34"
parley          = { version = "0.9.0", default-features = false, features = ["std"] }
smallvec        = "1"
ttf-parser      = "0.25"

# dev-dependencies
bevy-inspector-egui = "0.36.0"
bevy_brp_extras     = "0.19.0"
bevy_lagrange       = "0.0.3"
bevy_window_manager = "0.20.2"
clay-layout         = { path = "vendor/clay-layout" }
criterion           = { version = "0.8.2", features = ["html_reports"] }
msdfgen             = "0.2"
# msdfgen 0.2 implements FontExt on ttf-parser 0.18's Face, not 0.25.
# Renamed import so parity tests can use both versions side by side.
ttf-parser_018 = { package = "ttf-parser", version = "0.18" }

[workspace.lints.clippy]
# Our strict lints
allow_attributes_without_reason = "deny"
expect_used                     = "deny"
panic                           = "deny"
unreachable                     = "deny"
unwrap_used                     = "deny"

# Enable lint groups as errors (with lower priority so allows can override)
all      = { level = "deny", priority = -1 }
cargo    = { level = "deny", priority = -1 }
nursery  = { level = "deny", priority = -1 }
pedantic = { level = "deny", priority = -1 }

# Universal allows
multiple_crate_versions = "allow"
redundant_pub_crate     = "allow"

# Allow specific lints that conflict with Bevy patterns
needless_pass_by_value = "allow"
option_if_let_else     = "allow"
too_many_arguments     = "allow"
type_complexity        = "allow"
wildcard_imports       = "allow"

[workspace.lints.rust]
missing_docs = "deny"
