[package]
authors     = ["natepiano"]
categories  = ["game-development"]
description = "Bevy camera controller with pan, orbit, zoom-to-fit, queued animations, and trackpad support"
edition     = "2024"
homepage    = "https://github.com/natepiano/bevy_lagrange"
keywords    = ["bevy", "camera", "gamedev", "orbit"]
license     = "MIT OR Apache-2.0"
name        = "bevy_lagrange"
readme      = "README.md"
repository  = "https://github.com/natepiano/bevy_lagrange"
version     = "0.0.1"

[lints.clippy]
# Our strict lints
expect_used = "deny"
panic       = "deny"
unwrap_used = "deny"

# Enable lint groups as errors (with lower priority so allows can override)
all      = { level = "deny", priority = -1 }
cargo    = { level = "deny", priority = -1 }
nursery  = { level = "deny", priority = -1 }
pedantic = { level = "deny", priority = -1 }

# Allow specific lints that conflict with common patterns
multiple_crate_versions = "allow"
needless_pass_by_value  = "allow"

# Bevy-specific allows
option_if_let_else = "allow" # False positives with Bevy reflect macros
too_many_arguments = "allow" # Bevy systems often require many params
type_complexity    = "allow" # Bevy query types are inherently complex
wildcard_imports   = "allow" # Bevy prelude convention

[lints.rust]
missing_docs = "deny"

[features]
bevy_egui = ["dep:bevy_egui"]
fit_overlay = [
  "bevy/bevy_asset",
  "bevy/bevy_gizmos",
  "bevy/bevy_log",
  "bevy/bevy_mesh",
  "bevy/bevy_pbr",
  "bevy/bevy_picking",
  "bevy/bevy_state",
  "bevy/bevy_text",
  "bevy/bevy_ui",
]

[dependencies]
bevy = { version = "0.18", default-features = false, features = [
  "bevy_camera",
  "bevy_core_pipeline",
  "bevy_window",
] }
bevy_egui = { version = "0.39", optional = true, default-features = false }

[dev-dependencies]
bevy = { version = "0.18", default-features = false, features = ["3d"] }
bevy_brp_extras = "0.19.0"
bevy_egui = { version = "0.39", default-features = false, features = [
  "default_fonts",
  "render",
] }
bevy_lagrange = { path = ".", features = ["bevy_egui", "fit_overlay"] }
bevy_window_manager = "0.19.0"
float-cmp = "0.10.0"

[[example]]
name              = "egui"
required-features = ["bevy_egui"]

[[example]]
name              = "showcase"
required-features = ["fit_overlay"]

[[example]]
name              = "zoom_to_fit"
required-features = ["fit_overlay"]

[[example]]
name              = "animation"
required-features = ["fit_overlay"]
